name: Update data & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  schedule:
    # JSTで毎時5分（UTCで毎時20分前）に実行 → 速報遅延考慮
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'cf-pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh earthquake data
        run: python3 scripts/fetch.py

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE }}
          CLOUDFLARE_ACCOUNT_ID: a697a3a284fa5543c640bc7d37f2c517
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name=nagano-eq-tracker \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="ci deploy ${{ github.sha }}"

      - name: Commit refreshed data
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh events.json [skip ci]"
            git push
          fi
